name: Continuous Integration

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/ci.yml"
      - "src/**"
      - ".python-version"
      - "demo.py"
      - "Makefile"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Basic setup
        uses: ./.github/actions/basic-setup

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Format
        run: make format-check

      - name: Lint
        run: make lint
