name: Release

on:
  workflow_dispatch:

jobs:
  ci-quality-gate:
    name: CI Quality Gate
    uses: ./.github/workflows/ci.yml

  build-and-publish:
    name: Build and Publish
    needs: ci-quality-gate
    runs-on: ubuntu-latest
    environment:
      name: pypi-release-env
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Basic setup
        uses: ./.github/actions/basic-setup

      - name: Validate version number
        run: |
          PY_VERSION=$(grep -oP "^version\s*=\s*['\"]\K[^'\"]+" pyproject.toml | head -1)
          TAG=${GITHUB_REF#refs/*/}

          if [ "$PY_VERSION" != "$TAG" ]; then
            echo "::error::Tag mismatch! Run tag: $TAG, pyproject.toml version: $PY_VERSION"
            exit 1
          fi

          echo "Validation succeeds, version number = $TAG"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
