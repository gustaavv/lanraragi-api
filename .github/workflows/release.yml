name: Release

on:
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi-release-env
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate version number
        run: |
          PY_VERSION=$(grep -oP "^version\s*=\s*['\"]\K[^'\"]+" pyproject.toml | head -1)
          TAG=${GITHUB_REF#refs/*/}

          if [ "$PY_VERSION" != "$TAG" ]; then
            echo "::error::Tag mismatch! Run tag: $TAG, pyproject.toml version: $PY_VERSION"
            exit 1
          fi

          echo "Validation succeeds, version number = $TAG"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
